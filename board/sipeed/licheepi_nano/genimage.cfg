image sdcard.img {
	hdimage {
	}

	partition u-boot {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8k
		size = 512k
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}

image boot.vfat {
	vfat {
		files = {
			"zImage",
			"suniv-f1c100s-licheepi-nano.dtb"
		}
	}
	size = 32M
}